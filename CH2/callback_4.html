<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="test"style="font-size:50px">LJU</p>
    <button onclick="inc()">Increase Font</button>
    <button onclick="dec()">Decrease Font</button>
    <button onclick="stop()">Stop</button>
    <script>
        var f=50
        function temp(f){
            document.getElementById("test").style.fontSize=f+"px"
        }
        function inc(){
            i=setInterval(()=>{
                if(f<150){
                    temp(++f)
                }
            },100)
        }
        function dec(){
           i=setInterval(()=>{
                if(f>20){
                    temp(--f)
                }
            },100)
        }
        function stop(){
            clearInterval(i)
        }
    </script>
</body>
</html>
