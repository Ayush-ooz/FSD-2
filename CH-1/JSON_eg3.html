<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const emp=[{
            "name":"pqr",
            "age":20
        },
        {
            "name":"xyz",
            "age":15
        },
        {
            "name":"mno",
            "age":18
        }
    ]
    var e=emp.sort((a,b)=>b.age-a.age)
    for(e1 of e){
        console.log(e1.name+" "+e1.age)
    }
    console.log(e[e.length-1].name+" "+e[e.length-1].age)
    var max_age=Math.max(...emp.map(e=>e.age))
    console.log(max_age)
    </script>
</body>
</html>
